name: Build SRS Files

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run conversion script
        run: |
          chmod +x scripts/convert.sh
          ./scripts/convert.sh

      - name: List generated files
        run: |
          ls -la rules/
          test -f rules/geoip.srs
          test -f rules/geosite.srs

      - name: Upload SRS files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srs-files
          path: |
            rules/geoip.srs
            rules/geosite.srs
          retention-days: 1

      - name: Delete previous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete srs-latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true

      - name: Publish SRS files to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: srs-latest
          name: SRS Latest
          body: |
            Auto-updated SRS files from workflow run #${{ github.run_number }}.
            geoip.dat: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geoip/release/geoip.dat
            geosite.dat: https://raw.githubusercontent.com/runetfreedom/russia-blocked-geosite/release/geosite.dat
            Source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            rules/geoip.srs
            rules/geosite.srs
          overwrite_files: true
          make_latest: true
          fail_on_unmatched_files: true
