services:
  srs-trigger:
    image: alpine:3.19
    container_name: srs-trigger
    restart: unless-stopped
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_USER=${GITHUB_USER}
      - GITHUB_REPO=${GITHUB_REPO}
      - CRON_SCHEDULE=${CRON_SCHEDULE:-0 */2 * * *}
    command: >
      sh -c '
      apk add --no-cache curl >/dev/null

      trigger() {
        echo "[$$(date)] Triggering workflow..."
        RESP=$$(curl -s -o /dev/null -w "%{http_code}" -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer $$GITHUB_TOKEN" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          -d "{\"ref\":\"main\"}" \
          "https://api.github.com/repos/$$GITHUB_USER/$$GITHUB_REPO/actions/workflows/build-srs.yml/dispatches")
        if [ "$$RESP" = "204" ]; then
          echo "[$$(date)] OK"
        else
          echo "[$$(date)] ERROR $$RESP"
        fi
      }

      trigger

      echo "$$CRON_SCHEDULE /entrypoint.sh >> /var/log/cron.log 2>&1" | crontab -
      crond -f
      '
